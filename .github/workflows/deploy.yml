name: Deploy
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build para GitHub Pages (con base /manteplanta/)
      - run: cd manteplanta && npm install && npm run build

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: manteplanta/dist

      # Build para uso local (con base /)
      - run: cd manteplanta && npx vite build --base=/

      - name: Crear iniciar.bat
        run: |
          cat > manteplanta/dist/iniciar.bat << 'EOF'
          @echo off
          cd /d "%~dp0"
          if not exist "index.html" (
              echo ERROR: No se encuentra index.html en esta carpeta.
              pause
              exit /b
          )
          start "" "http://localhost:8080"
          timeout /t 2 >nul
          python -m http.server 8080
          EOF

      # Exportar ZIP para uso local
      - name: Empaquetar para uso local
        uses: actions/upload-artifact@v4
        with:
          name: APP-Nuevos-Desarrollos
          path: manteplanta/dist/
